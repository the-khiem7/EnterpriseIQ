# Local development database for EnterpriseIQ.
# Postgres 16 with pgvector + pgrouting (see docker/Dockerfile.postgres).
#
#   docker compose up -d --build
#   npm run migrate
#
services:
  db:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    container_name: enterpriseiq-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterpriseiq
    ports:
      - "5433:5432"
    volumes:
      - enterpriseiq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enterpriseiq"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  enterpriseiq_pgdata:
